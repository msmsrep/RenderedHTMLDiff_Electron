<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; object-src 'none'; base-uri 'self';"
    />
    <title>Rendered HTML Diff</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-shape bg-shape-left"></div>
    <div class="bg-shape bg-shape-right"></div>

    <main class="app-shell">
      <header class="app-header">
        <div class="title-row">
          <img
            class="title-icon"
            src="../../assets/icon-64.png"
            alt="App icon"
          />
          <h1>Rendered HTML Diff</h1>
        </div>
        <p>
          Select two HTML files and visualize rendered text differences with
          color highlights.
        </p>
      </header>

      <section class="panel controls">
        <div class="control-row">
          <label>Old HTML</label>
          <div class="picker-group">
            <input
              id="oldPath"
              type="text"
              readonly
              placeholder="Select old.html"
            />
            <button id="pickOld" type="button">Choose</button>
          </div>
        </div>

        <div class="control-row">
          <label>New HTML</label>
          <div class="picker-group">
            <input
              id="newPath"
              type="text"
              readonly
              placeholder="Select new.html"
            />
            <button id="pickNew" type="button">Choose</button>
          </div>
        </div>

        <div class="action-row">
          <button id="runDiff" type="button" class="primary">
            Generate Diff
          </button>
          <button id="saveDiff" type="button">Save as HTML</button>
          <span id="status" class="status">Please select files</span>
        </div>
      </section>

      <section class="panel preview">
        <div class="preview-header">
          <h2>Diff Preview</h2>
          <label class="mode-label" for="diffMode">Diff Mode</label>
          <select id="diffMode">
            <option value="chars">Characters</option>
            <option value="words" selected>Words</option>
            <option value="lines">Lines</option>
          </select>
        </div>
        <iframe id="previewFrame" title="Diff Preview"></iframe>
      </section>
    </main>

    <script src="renderer.js"></script>
  </body>
</html>
